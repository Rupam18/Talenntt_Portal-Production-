services:
  # Backend Web Service
  - type: web
    name: talent-portal-backend
    env: docker
    dockerContext: src/backend
    plan: free
    envVars:
      - key: PORT
        value: 8081
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://ep-little-voice-a4awxxfm-pooler.us-east-1.aws.neon.tech/neondb?sslmode=require
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: SQL_INIT_MODE
        value: always
      - key: ALLOWED_ORIGINS
        fromService:
          type: static
          name: talent-portal-frontend
          property: url
      - key: FRONTEND_URL
        fromService:
          type: static
          name: talent-portal-frontend
          property: url
      - key: SPRING_MAIL_USERNAME
        sync: false
      - key: SPRING_MAIL_PASSWORD
        sync: false
      - key: JUDGE0_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
    healthCheckPath: /api/students

  # Frontend Static Site
  - type: static
    name: talent-portal-frontend
    env: static
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: talent-portal-backend
          property: url
