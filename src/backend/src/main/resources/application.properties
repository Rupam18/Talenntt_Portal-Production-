spring.application.name=codeverge-talent-portal
server.port=${PORT:8081}

# Database Configuration (PostgreSQL - Neon/Supabase)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://ep-little-voice-a4awxxfm-pooler.us-east-1.aws.neon.tech/neondb?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:neondb_owner}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:npg_HeVFI9JDo3kO}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pooling Configuration
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:10}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:5}
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.pool-name=QuestionHikariCP
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.connection-test-query=SELECT 1

# Neon-specific SSL Configuration
spring.datasource.hikari.data-source-properties.ssl=${DB_SSL:true}
spring.datasource.hikari.data-source-properties.sslmode=${DB_SSL_MODE:require}
spring.datasource.hikari.data-source-properties.sslfactory=org.postgresql.ssl.DefaultJavaSSLFactory

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Initialize schema on startup
spring.sql.init.mode=${SQL_INIT_MODE:always}

